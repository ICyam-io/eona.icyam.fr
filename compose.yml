services:
  php:
    build: .
    container_name: eona
    restart: unless-stopped
    volumes:
      - ./www:/var/www/html:rw
      - ./apache.conf:/etc/apache2/sites-available/000-default.conf:ro
      - ./uploads:/var/www/uploads:rw
    env_file:
      - .env
    networks:
      - private-net
      - public-net
    labels:
      - "traefik.enable=true"
      # Dev — basic auth pendant le développement
      # Dev — basic auth during development
      - "traefik.http.routers.eona-dev.rule=Host(`eona.icyam.fr`)"
      - "traefik.http.routers.eona-dev.entrypoints=websecure"
      - "traefik.http.routers.eona-dev.tls.certresolver=letsencrypt"
      - "traefik.http.routers.eona-dev.middlewares=eona-auth"
      - "traefik.http.middlewares.eona-auth.basicauth.users=${BASIC_AUTH_USERS}"
      # Prod — décommenter au go-live, commenter la section dev ci-dessus
      # Prod — uncomment at go-live, comment out the dev section above
      # - "traefik.http.routers.eona.rule=Host(`eona.icyam.fr`)"
      # - "traefik.http.routers.eona.entrypoints=websecure"
      # - "traefik.http.routers.eona.tls.certresolver=letsencrypt"

networks:
  private-net:
    external: true
  public-net:
    external: true
